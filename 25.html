<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="utf-8">
  <title>課題25</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    nav {
      position: fixed;
      top: -50px;
      left: 0;
      width: 100%;
      height: 50px;
      background-color: blue;
      color: white;
      transition: top 1s;
    }
    nav ul {
      display: flex;
      flex-direction: row;
      align-items: center;
      list-style-type: none;
      height: 50px;
    }
    nav ul li {
      padding: 0 20px;
    }
    nav.open {
      top: 0;
    }
  </style>
</head>

<body>
  <nav id="auto-close-nav">
    <ul>
      <li>TOP</li>
      <li>NEWS</li>
      <li>GALLERY</li>
      <li>CONTACT</li>
    </ul>
  </nav>
  <p>ここにメニューが現れ，この文章は隠れます</p>
  <script src="main25.js"></script>
</body>

</html>
